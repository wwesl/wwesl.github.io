<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    
    <style>
        body *{
            margin: 15px 0;
        }

        span {
            font-size: 50px;
        };
    </style>
</head>

<body>
    <h2 style="color: red;">Dupla 1</h2>
    <button class="addred">+1</button>
    <button class="addred">+3</button>
    <button class="addred">+6</button>
    <button class="addred">+9</button>
    <button class="addred">+12</button>

    <h2 style="color: blue;">Dupla 2</h2>
    <button class="addblue">+1</button>
    <button class="addblue">+3</button>
    <button class="addblue">+6</button>
    <button class="addblue">+9</button>
    <button class="addblue">+12</button>

    <h1>Pontuação</h1>
    <span id="redpoints" style="color: red;">0</span>
    <span>|</span>
    <span id="bluepoints" style="color: blue;">0</span>

    <h1 id="wintext" style="opacity: 0; margin: 0;">|</h1>
    <br><button id="reset" style="margin: 0;">REINICIAR</button>
</body>

<script src="script.js"></script>
</html>
