<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Links</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            gap: 3vh;

            background-color: #111;
        }

        a {
            text-decoration: none;
            color: #ff0060;
            font-weight: bold;
            font-family: monospace;
            font-size: 30px;

            background-color: #412;
            width: fit-content;

            border: 0;
            border-radius: 4px;
            padding: 6px;
            outline: solid #f7b5 2px;
            outline-offset: -5px;
        }

        a:hover {
            color: #fff;
            background-color: #824;
        }
    </style>
</head>

<body>
    <a href="https://wwesl.github.io" target="_blank">
        : MAIN_</a>
    <a href="https://wwesl.github.io/truco" target="_blank">
        : TRUCO_</a>
    <a href="https://wwesl.github.io/jogo-educacional" target="_blank">
        : JOGO EDUCACIONAL_</a>
    <a href="https://wwesl.github.io/wwesl/jogo-clique" target="_blank">
        : JOGO CLIQUE_</a>
</body>

</html>
